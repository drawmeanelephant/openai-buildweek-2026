name: Build, Validate and deploy Field Guide

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Field Guide
        uses: actions/checkout@v4

      - name: Submission preflight
        run: python3 tools/submission_preflight.py

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check out Boris v0.7.0
        run: git clone --depth 1 --branch v0.7.0 https://github.com/drawmeanelephant/boris.git .boris

      - name: Build Boris
        working-directory: .boris
        run: zig build

      - name: Compile the Field Guide
        run: |
          # 1. Compile HTML Static Site
          .boris/zig-out/bin/boris \
            --input site/content \
            --theme site/theme \
            --layout-rule default id:index site/theme/layouts/home.html \
            --html-dir dist \
            --quiet
          # 2. Compile JSON IR
          .boris/zig-out/bin/boris \
            --input site/content \
            --no-rag \
            --out dist/ir \
            --quiet
          # 3. Compile RAG Chunks
          .boris/zig-out/bin/boris \
            --input site/content \
            --rag \
            --rag-dir dist/rag \
            --quiet
          # 4. Compile Unified Context Bundle
          .boris/zig-out/bin/boris \
            --input site/content \
            --context \
            --context-dir dist/context \
            --quiet
          # 5. Compile llms.txt Manifest
          .boris/zig-out/bin/boris \
            --input site/content \
            --llms \
            --llms-path dist/llms.txt \
            --quiet

      - name: Run verification script
        run: python3 .github/scripts/validate.py

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  ci:
    name: ci
    needs: [build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require Field Guide build success
        run: |
          result="${{ needs.build.result }}"
          echo "Field Guide build result: ${result}"
          test "${result}" = "success"
